<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棍母</title>
    <link rel="icon" href="gunmu.ico" type="image/x-icon">
    <style>
        /* 基础样式重置，确保全屏效果无边界 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Microsoft YaHei", sans-serif;
            overflow-x: hidden;
        }
        /* 全屏图片部分：使用背景图覆盖整个视口 */
        .hero-section {
            height: 100vh;
            background-image: url('gunmu.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* 滚动时背景固定 */
        }
        /* 文字部分：居中显示91个"棍母" */
        .text-section {
            padding: 40px 20px;
            text-align: center;
            background-color: #f5f5f5;
            min-height: 100vh;
        }
        .gunmu-text {
            font-size: 24px;
            line-height: 1.8;
            display: inline-block;
            margin: 5px 10px;
        }
    </style>
</head>
<body>
    <!-- 全屏图片区域 -->
    <div class="hero-section"></div>
    
    <!-- 文字区域：通过JavaScript动态生成91个"棍母" -->
    <div class="text-section" id="textContainer">
        <!-- 文字由JS动态生成 -->
    </div>

    <script>
        // 动态生成91个"棍母"文字
        const textContainer = document.getElementById('textContainer');
        for (let i = 0; i < 91; i++) {
            const textElement = document.createElement('span');
            textElement.className = 'gunmu-text';
            textElement.textContent = '棍母';
            textContainer.appendChild(textElement);
        }
    </script>
</body>
</html>
